name: CI

on:
  # Runs when a PR is opened and on every push to that PR's branch
  # (opened, synchronize, reopened are the default pull_request activity types).
  pull_request:
  # Runs whenever main changes.
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check (typecheck + lint + format + test + knip + structure)
        run: pnpm check

      # PII / origin guard. Patterns live in the private PII_DENYLIST repo secret,
      # never in the open tree. Lists only matching file paths (never the matched
      # text) so a hit can't echo the secret into public logs. Skips when the
      # secret is absent (e.g. fork PRs). The fixtures dir is exempt until it is
      # regenerated synthetically — see RELEASE-CHECKLIST.md (WS2).
      - name: PII / origin guard
        env:
          PII_DENYLIST: ${{ secrets.PII_DENYLIST }}
        run: |
          if [ -z "$PII_DENYLIST" ]; then
            echo "PII_DENYLIST not set; skipping (expected on fork PRs)."
            exit 0
          fi
          if git grep -lEi "$PII_DENYLIST" -- ':!packages/pipeline/fixtures' ':!pnpm-lock.yaml'; then
            echo "::error::PII/origin leak detected in the file(s) listed above."
            exit 1
          fi
          echo "PII guard passed."
